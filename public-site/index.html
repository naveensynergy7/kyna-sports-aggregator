<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Games</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1 class="page-title">Featured Games</h1>
        </header>

        <main>

            <div class="info-text">

        </main>
    </div>

    <script src="js/script.js"></script>

</html>
